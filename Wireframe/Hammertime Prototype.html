<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Hammertime — M001 UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="views/forge.jsx"></script>
<script type="text/babel" src="views/expeditions.jsx"></script>
<script type="text/babel" src="views/prestige.jsx"></script>
<script type="text/babel" src="views/settings.jsx"></script>
<script type="text/babel" src="views/other.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection id="m001" title="M001 · The Four Screens" subtitle="Desktop 1280×720. The Forge is the main screen; Expeditions, Prestige, and Settings are accessed via the top tab bar.">
          <DCArtboard id="forge" label="The Forge · crafting · inventory · hero" width={1280} height={720}>
            <ForgeView />
          </DCArtboard>
          <DCArtboard id="expeditions" label="Expeditions · Iron Quarry · Steel Depths" width={1280} height={720}>
            <ExpeditionsView />
          </DCArtboard>
          <DCArtboard id="prestige" label="Prestige · The Reforging" width={1280} height={720}>
            <PrestigeView />
          </DCArtboard>
          <DCArtboard id="settings" label="Settings · minimal stack" width={1280} height={720}>
            <SettingsView />
          </DCArtboard>
        </DCSection>

        <DCSection id="detail" title="Reference · Tooltip Detail" subtitle="Kept from earlier exploration — shows the full affix/flavor treatment for an item.">
          <DCArtboard id="tip" label="Tooltip · full detail" width={520} height={720}>
            <TooltipView />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
